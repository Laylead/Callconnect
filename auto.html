<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Funding Dashboard</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    
    <!-- External files -->
    <script src="firebase-config.js"></script>
    <script src="pay.js"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            padding: 40px 20px;
            margin: 0;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: #f97316;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #94a3b8;
            margin-bottom: 30px;
        }
        
        button {
            background: #f97316;
            border: none;
            padding: 12px 24px;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            margin-right: 10px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #ea580c;
            transform: translateY(-2px);
        }
        
        button.secondary {
            background: #1e293b;
            border: 1px solid #334155;
        }
        
        button.secondary:hover {
            background: #2d3a4e;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        
        .stat-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 20px;
        }
        
        .stat-card h3 {
            font-size: 28px;
            color: #f97316;
            margin: 0 0 5px 0;
        }
        
        .stat-card p {
            color: #94a3b8;
            margin: 0;
        }
        
        .section {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 20px;
            margin-top: 30px;
            overflow-x: auto;
        }
        
        .section h2 {
            color: white;
            margin-top: 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            text-align: left;
            padding: 12px;
            color: #94a3b8;
            font-weight: 600;
            border-bottom: 1px solid #334155;
        }
        
        td {
            padding: 12px;
            border-bottom: 1px solid #2d3a4e;
        }
        
        .success {
            color: #4ade80;
        }
        
        .failed {
            color: #f87171;
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-badge.success {
            background: #166534;
            color: #86efac;
        }
        
        .status-badge.failed {
            background: #7f1d1d;
            color: #fca5a5;
        }
        
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        
        .toast.success {
            background: #166534;
        }
        
        .toast.error {
            background: #7f1d1d;
        }
        
        .toast.info {
            background: #1e293b;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f97316;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .stats {
                grid-template-columns: 1fr;
            }
            
            table {
                font-size: 14px;
            }
            
            td, th {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ Creator Funding Dashboard</h1>
        <div class="subtitle">Paystack → Firebase Wallet · Duplicate Safe · Live</div>
        
        <div>
            <button onclick="fetchPaystackTransactions()">
                <span class="loading" style="display: none;" id="fetchLoading"></span>
                Fetch New Transactions
            </button>
            <button class="secondary" onclick="retryAllFailed()">
                <span class="loading" style="display: none;" id="retryLoading"></span>
                Auto Fund Failed
            </button>
            <button class="secondary" onclick="loadDashboardData()">
                Refresh Data
            </button>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <h3 id="totalTx">0</h3>
                <p>Total Transactions</p>
            </div>
            <div class="stat-card">
                <h3 id="successfulTx">0</h3>
                <p>Successful Funding</p>
            </div>
            <div class="stat-card">
                <h3 id="failedTx">0</h3>
                <p>Failed Funding</p>
            </div>
            <div class="stat-card">
                <h3 id="totalAmount">₦0</h3>
                <p>Total Amount Funded</p>
            </div>
        </div>
        
        <!-- Successful Funding Table -->
        <div class="section">
            <h2>✅ Successful Funding</h2>
            <table id="successTable">
                <thead>
                    <tr>
                        <th>Email</th>
                        <th>Amount</th>
                        <th>Reference</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="4" style="text-align: center;">Loading...</td></tr>
                </tbody>
            </table>
        </div>
        
        <!-- Failed Transactions Table -->
        <div class="section">
            <h2>❌ Failed Transactions</h2>
            <table id="failedTable">
                <thead>
                    <tr>
                        <th>Email</th>
                        <th>Amount</th>
                        <th>Reason</th>
                        <th>Date</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="5" style="text-align: center;">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <div id="toast" style="display: none;"></div>
    
    <script>
        // Initialize Firebase
        let db;
        let auth;
        let currentUser = null;
        const CREATOR_EMAIL = "mynumba100@gmail.com";
        
        try {
            if (typeof firebaseConfig !== 'undefined') {
                firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
                auth = firebase.auth();
                console.log('✅ Firebase initialized');
            } else {
                console.error('❌ Firebase config not found');
                showToast('Firebase configuration missing', 'error');
            }
        } catch (error) {
            console.error('❌ Firebase init error:', error);
            showToast('Failed to initialize Firebase', 'error');
        }
        
        // Auth state listener
        auth.onAuthStateChanged(async (user) => {
            if (user && user.email === CREATOR_EMAIL) {
                currentUser = user;
                console.log('✅ Creator authenticated:', user.email);
                showToast(`Welcome ${user.email}`, 'success');
                await loadDashboardData();
            } else if (user) {
                console.log('❌ Unauthorized user:', user.email);
                showToast('Access denied. Creator only.', 'error');
                setTimeout(() => auth.signOut(), 2000);
            } else {
                console.log('⏳ Waiting for authentication...');
                // Try to sign in anonymously or redirect to login
                showToast('Please login as creator', 'info');
            }
        });
        
        // Show toast notification
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.style.display = 'block';
            
            setTimeout(() => {
                toast.style.display = 'none';
            }, 4000);
        }
        
        // Load dashboard data from Firebase
        async function loadDashboardData() {
            try {
                if (!db) {
                    showToast('Firebase not initialized', 'error');
                    return;
                }
                
                console.log('📊 Loading dashboard data...');
                
                const snapshot = await db.collection('transactions')
                    .orderBy('timestamp', 'desc')
                    .limit(100)
                    .get();
                
                const transactions = [];
                snapshot.forEach(doc => {
                    transactions.push({ id: doc.id, ...doc.data() });
                });
                
                console.log(`📊 Loaded ${transactions.length} transactions`);
                updateTables(transactions);
                updateStats(transactions);
                
            } catch (error) {
                console.error('❌ Error loading data:', error);
                showToast('Error loading data: ' + error.message, 'error');
            }
        }
        
        // Update tables with transaction data
        function updateTables(transactions) {
            const successTbody = document.querySelector('#successTable tbody');
            const failedTbody = document.querySelector('#failedTable tbody');
            
            const successful = transactions.filter(t => t.funded === true);
            const failed = transactions.filter(t => t.funded === false || t.status === 'failed');
            
            // Update success table
            if (successful.length === 0) {
                successTbody.innerHTML = '<tr><td colspan="4" style="text-align: center;">No successful transactions</td></tr>';
            } else {
                successTbody.innerHTML = successful.map(t => {
                    const date = t.timestamp?.toDate ? t.timestamp.toDate().toLocaleString() : 'N/A';
                    return `
                        <tr>
                            <td>${t.email || 'N/A'}</td>
                            <td class="success">₦${(t.amount || 0).toLocaleString()}</td>
                            <td>${t.reference || 'N/A'}</td>
                            <td>${date}</td>
                        </tr>
                    `;
                }).join('');
            }
            
            // Update failed table
            if (failed.length === 0) {
                failedTbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">No failed transactions</td></tr>';
            } else {
                failedTbody.innerHTML = failed.map(t => {
                    const date = t.timestamp?.toDate ? t.timestamp.toDate().toLocaleString() : 'N/A';
                    return `
                        <tr>
                            <td>${t.email || 'N/A'}</td>
                            <td class="failed">₦${(t.amount || 0).toLocaleString()}</td>
                            <td>${t.reason || 'Unknown error'}</td>
                            <td>${date}</td>
                            <td>
                                <button onclick="manualFund('${t.reference}')" style="padding: 4px 8px; font-size: 12px;">
                                    Manual Fund
                                </button>
                            </td>
                        </tr>
                    `;
                }).join('');
            }
        }
        
        // Update statistics
        function updateStats(transactions) {
            const total = transactions.length;
            const successful = transactions.filter(t => t.funded === true).length;
            const failed = transactions.filter(t => t.funded === false || t.status === 'failed').length;
            const totalAmount = transactions
                .filter(t => t.funded === true)
                .reduce((sum, t) => sum + (t.amount || 0), 0);
            
            document.getElementById('totalTx').textContent = total;
            document.getElementById('successfulTx').textContent = successful;
            document.getElementById('failedTx').textContent = failed;
            document.getElementById('totalAmount').textContent = `₦${totalAmount.toLocaleString()}`;
        }
        
        // Fetch transactions from Paystack
        async function fetchPaystackTransactions() {
            const loadingEl = document.getElementById('fetchLoading');
            loadingEl.style.display = 'inline-block';
            
            try {
                showToast('Fetching transactions from Paystack...', 'info');
                
                if (!window.paystack) {
                    throw new Error('pay.js not loaded');
                }
                
                console.log('📥 Fetching Paystack transactions...');
                const transactions = await paystack.fetchTransactions({ perPage: 50 });
                
                if (!transactions || transactions.length === 0) {
                    showToast('No new transactions found', 'info');
                    return;
                }
                
                console.log(`📥 Found ${transactions.length} transactions`);
                
                let processed = 0;
                let failed = 0;
                
                for (const tx of transactions) {
                    // Check if transaction already exists
                    const existing = await db.collection('transactions')
                        .where('reference', '==', tx.reference)
                        .get();
                    
                    if (!existing.empty) {
                        console.log('⏭️ Transaction already exists:', tx.reference);
                        continue;
                    }
                    
                    // Process transaction
                    const result = await processTransaction(tx);
                    if (result) {
                        processed++;
                    } else {
                        failed++;
                    }
                }
                
                showToast(`✅ Processed: ${processed} successful, ${failed} failed`, 'success');
                await loadDashboardData();
                
            } catch (error) {
                console.error('❌ Error fetching transactions:', error);
                showToast('Error: ' + error.message, 'error');
            } finally {
                loadingEl.style.display = 'none';
            }
        }
        
        // Process a single transaction
        async function processTransaction(tx) {
            try {
                // Validate transaction
                if (tx.status !== 'success') {
                    await saveFailedTransaction(tx, 'Transaction not successful');
                    return false;
                }
                
                if (!tx.customer?.email) {
                    await saveFailedTransaction(tx, 'Missing customer email');
                    return false;
                }
                
                if (!tx.amount || tx.amount <= 0) {
                    await saveFailedTransaction(tx, 'Invalid amount');
                    return false;
                }
                
                // Find user by email
                const usersRef = db.collection('users');
                const userSnapshot = await usersRef.where('email', '==', tx.customer.email).get();
                
                if (userSnapshot.empty) {
                    await saveFailedTransaction(tx, 'User not found in Firebase');
                    return false;
                }
                
                const userDoc = userSnapshot.docs[0];
                const userData = userDoc.data();
                const amountNaira = tx.amount / 100;
                
                // Update user wallet and save transaction
                const batch = db.batch();
                
                // Update user wallet
                const userRef = db.collection('users').doc(userDoc.id);
                batch.update(userRef, {
                    walletBalance: (userData.walletBalance || 0) + amountNaira
                });
                
                // Save transaction record
                const txRef = db.collection('transactions').doc();
                batch.set(txRef, {
                    reference: tx.reference,
                    email: tx.customer.email,
                    amount: amountNaira,
                    status: 'success',
                    funded: true,
                    reason: 'Auto-funded from Paystack',
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                await batch.commit();
                
                console.log(`✅ Funded ${tx.customer.email}: ₦${amountNaira}`);
                showToast(`Funded ${tx.customer.email}: ₦${amountNaira}`, 'success');
                return true;
                
            } catch (error) {
                console.error('❌ Error processing transaction:', error);
                await saveFailedTransaction(tx, 'Processing error: ' + error.message);
                return false;
            }
        }
        
        // Save failed transaction
        async function saveFailedTransaction(tx, reason) {
            try {
                await db.collection('transactions').add({
                    reference: tx.reference || 'unknown',
                    email: tx.customer?.email || 'unknown',
                    amount: tx.amount ? tx.amount / 100 : 0,
                    status: 'failed',
                    funded: false,
                    reason: reason,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                console.log('❌ Failed transaction saved:', reason);
            } catch (error) {
                console.error('Error saving failed transaction:', error);
            }
        }
        
        // Manual fund a transaction
        async function manualFund(reference) {
            if (!reference) {
                showToast('Invalid reference', 'error');
                return;
            }
            
            try {
                showToast('Processing manual funding...', 'info');
                
                // Verify with Paystack
                const verification = await paystack.verifyTransaction(reference);
                
                if (!verification.status || verification.data?.status !== 'success') {
                    showToast('Transaction verification failed', 'error');
                    return;
                }
                
                const tx = verification.data;
                
                // Find user
                const userSnapshot = await db.collection('users')
                    .where('email', '==', tx.customer.email)
                    .get();
                
                if (userSnapshot.empty) {
                    showToast('User not found', 'error');
                    return;
                }
                
                const userDoc = userSnapshot.docs[0];
                const userData = userDoc.data();
                const amountNaira = tx.amount / 100;
                
                // Update in batch
                const batch = db.batch();
                
                batch.update(db.collection('users').doc(userDoc.id), {
                    walletBalance: (userData.walletBalance || 0) + amountNaira
                });
                
                // Check if transaction record exists
                const existingTx = await db.collection('transactions')
                    .where('reference', '==', reference)
                    .get();
                
                if (existingTx.empty) {
                    const txRef = db.collection('transactions').doc();
                    batch.set(txRef, {
                        reference: reference,
                        email: tx.customer.email,
                        amount: amountNaira,
                        status: 'success',
                        funded: true,
                        reason: 'Manually funded',
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } else {
                    batch.update(existingTx.docs[0].ref, {
                        funded: true,
                        status: 'success',
                        reason: 'Manually funded'
                    });
                }
                
                await batch.commit();
                
                showToast(`✅ Manually funded: ₦${amountNaira}`, 'success');
                await loadDashboardData();
                
            } catch (error) {
                console.error('❌ Manual funding error:', error);
                showToast('Manual funding failed: ' + error.message, 'error');
            }
        }
        
        // Retry all failed transactions
        async function retryAllFailed() {
            const loadingEl = document.getElementById('retryLoading');
            loadingEl.style.display = 'inline-block';
            
            try {
                const failedSnapshot = await db.collection('transactions')
                    .where('funded', '==', false)
                    .limit(50)
                    .get();
                
                if (failedSnapshot.empty) {
                    showToast('No failed transactions to retry', 'info');
                    return;
                }
                
                console.log(`🔄 Retrying ${failedSnapshot.size} failed transactions...`);
                showToast(`Retrying ${failedSnapshot.size} transactions...`, 'info');
                
                let successCount = 0;
                
                for (const doc of failedSnapshot.docs) {
                    const tx = doc.data();
                    if (tx.reference) {
                        await manualFund(tx.reference);
                        successCount++;
                    }
                }
                
                showToast(`✅ Retried ${successCount} transactions`, 'success');
                await loadDashboardData();
                
            } catch (error) {
                console.error('❌ Error retrying failed:', error);
                showToast('Error: ' + error.message, 'error');
            } finally {
                loadingEl.style.display = 'none';
            }
        }
        
        // Make functions global
        window.fetchPaystackTransactions = fetchPaystackTransactions;
        window.retryAllFailed = retryAllFailed;
        window.loadDashboardData = loadDashboardData;
        window.manualFund = manualFund;
        
    </script>
</body>
</html>
