<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Creator Funding Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script src="firebase-config.js"></script>
<script src="pay.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
padding:40px;
}

h1{
margin-bottom:20px;
}

button{
background:#f97316;
border:none;
padding:10px 16px;
border-radius:6px;
color:white;
cursor:pointer;
margin-right:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

td,th{
padding:12px;
border-bottom:1px solid #333;
}

.success{color:#22c55e}
.failed{color:#ef4444}

</style>

</head>

<body>

<h1>Creator Funding Dashboard</h1>

<button onclick="fetchTransactions()">Fetch Paystack Transactions</button>
<button onclick="retryFailed()">Retry Failed</button>

<h2>Successful Funding</h2>

<table>
<thead>
<tr>
<th>Email</th>
<th>Amount</th>
<th>Reference</th>
<th>Date</th>
</tr>
</thead>
<tbody id="successTable"></tbody>
</table>

<h2>Failed Transactions</h2>

<table>
<thead>
<tr>
<th>Email</th>
<th>Amount</th>
<th>Reason</th>
<th>Action</th>
</tr>
</thead>
<tbody id="failedTable"></tbody>
</table>

<script>

const db = firebase.firestore();

async function fetchTransactions(){

let page = 1;
let hasMore = true;

while(hasMore){

const txs = await paystack.fetchTransactions(page);

if(!txs.length){

hasMore = false;
break;

}

for(const tx of txs){

await processTransaction(tx);

}

page++;

}

loadDashboard();

}

async function processTransaction(tx){

const reference = tx.reference;

const txRef = db.collection("transactions").doc(reference);

const existing = await txRef.get();

if(existing.exists) return;

try{

const verified = await paystack.verifyTransaction(reference);

if(verified.status !== "success"){

await saveFailed(tx,"Verification failed");
return;

}

const email = verified.customer.email;

const amount = verified.amount / 100;

const userQuery = await db.collection("users")
.where("email","==",email)
.get();

if(userQuery.empty){

await saveFailed(tx,"User not found");
return;

}

const userDoc = userQuery.docs[0];

const batch = db.batch();

batch.update(userDoc.ref,{
walletBalance:firebase.firestore.FieldValue.increment(amount)
});

batch.set(txRef,{
reference,
email,
amount,
funded:true,
timestamp:firebase.firestore.FieldValue.serverTimestamp()
});

await batch.commit();

addSuccess(email,amount,reference);

}catch(e){

await saveFailed(tx,e.message);

}

}

async function saveFailed(tx,reason){

const reference = tx.reference;

await db.collection("transactions").doc(reference).set({

reference,
email:tx.customer?.email || "unknown",
amount:(tx.amount||0)/100,
funded:false,
reason,
timestamp:firebase.firestore.FieldValue.serverTimestamp()

});

addFailed(tx.customer?.email,(tx.amount||0)/100,reason,reference);

}

function addSuccess(email,amount,ref){

const table = document.getElementById("successTable");

table.innerHTML += `
<tr class="success">
<td>${email}</td>
<td>₦${amount}</td>
<td>${ref}</td>
<td>${new Date().toLocaleString()}</td>
</tr>
`;

}

function addFailed(email,amount,reason,ref){

const table = document.getElementById("failedTable");

table.innerHTML += `
<tr class="failed">
<td>${email}</td>
<td>₦${amount}</td>
<td>${reason}</td>
<td>
<button onclick="manualFund('${ref}')">
Manual Fund
</button>
</td>
</tr>
`;

}

async function manualFund(reference){

const verified = await paystack.verifyTransaction(reference);

if(verified.status !== "success"){

alert("Verification failed");
return;

}

const email = verified.customer.email;

const amount = verified.amount / 100;

const userQuery = await db.collection("users")
.where("email","==",email)
.get();

if(userQuery.empty){

alert("User not found");
return;

}

const userDoc = userQuery.docs[0];

const batch = db.batch();

batch.update(userDoc.ref,{
walletBalance:firebase.firestore.FieldValue.increment(amount)
});

batch.update(
db.collection("transactions").doc(reference),
{
funded:true,
reason:"Manually funded"
}
);

await batch.commit();

alert("Wallet funded");

loadDashboard();

}

async function retryFailed(){

const failed = await db.collection("transactions")
.where("funded","==",false)
.get();

for(const doc of failed.docs){

await manualFund(doc.id);

}

}

async function loadDashboard(){

const snapshot = await db.collection("transactions")
.orderBy("timestamp","desc")
.limit(100)
.get();

const successTable = document.getElementById("successTable");
const failedTable = document.getElementById("failedTable");

successTable.innerHTML="";
failedTable.innerHTML="";

snapshot.forEach(doc=>{

const tx = doc.data();

if(tx.funded){

addSuccess(tx.email,tx.amount,tx.reference);

}else{

addFailed(tx.email,tx.amount,tx.reason,tx.reference);

}

});

}

loadDashboard();

</script>

</body>
</html>
