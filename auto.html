<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Creator Funding Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script src="firebase-config.js"></script>
<script src="pay.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:40px;
}

h1{
margin-bottom:20px;
}

button{
background:#ff7a00;
border:none;
padding:10px 15px;
color:white;
border-radius:6px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

td,th{
padding:12px;
border-bottom:1px solid #333;
}

.fail{
color:#ff4d4d;
}

.success{
color:#22c55e;
}

</style>

</head>
<body>

<h1>Creator Funding Dashboard</h1>

<button onclick="loadTransactions()">Load New Transactions</button>
<button onclick="retryAllFailed()">Auto Fund Failed</button>

<h2>Successful Funding</h2>

<table id="successTable">
<tr>
<th>Email</th>
<th>Amount</th>
<th>Reference</th>
</tr>
</table>

<h2>Failed Transactions</h2>

<table id="failedTable">
<tr>
<th>Email</th>
<th>Amount</th>
<th>Reason</th>
<th>Action</th>
</tr>
</table>

<script>

const db = firebase.firestore();

let lastTimestamp = 0;

async function loadLastTimestamp(){

const doc = await db.collection("system").doc("funding").get();

if(doc.exists){

lastTimestamp = doc.data().lastTimestamp || 0;

}

}

async function saveTimestamp(ts){

await db.collection("system").doc("funding").set({
lastTimestamp:ts
});

}

async function loadTransactions(){

await loadLastTimestamp();

const transactions = await fetchTransactions(lastTimestamp);

for(const tx of transactions){

await processTransaction(tx);

}

}

async function processTransaction(tx){

if(tx.status !== "success") return;

const reference = tx.reference;

const existing = await db.collection("transactions").doc(reference).get();

if(existing.exists){

addFailed(tx,"Duplicate transaction");

return;

}

try{

const verified = await verifyTransaction(reference);

if(verified.status !== "success"){

addFailed(tx,"Verification failed");

return;

}

const email = verified.customer.email;

const amount = verified.amount / 100;

const userQuery = await db.collection("users")
.where("email","==",email)
.get();

if(userQuery.empty){

addFailed(tx,"User not found");

return;

}

const userDoc = userQuery.docs[0];

const userRef = userDoc.ref;

await db.runTransaction(async(t)=>{

const snap = await t.get(userRef);

const balance = snap.data().walletBalance || 0;

t.update(userRef,{
walletBalance:balance+amount
});

t.set(
db.collection("transactions").doc(reference),
{
email,
amount,
reference,
date:Date.now()
}
);

});

addSuccess(email,amount,reference);

if(tx.paid_at){

const ts = new Date(tx.paid_at).getTime();

if(ts > lastTimestamp){

lastTimestamp = ts;

await saveTimestamp(ts);

}

}

}catch(err){

addFailed(tx,err.message);

}

}

function addSuccess(email,amount,ref){

const table = document.getElementById("successTable");

const row = table.insertRow();

row.className="success";

row.innerHTML=`
<td>${email}</td>
<td>₦${amount}</td>
<td>${ref}</td>
`;

}

function addFailed(tx,reason){

const table = document.getElementById("failedTable");

const row = table.insertRow();

row.className="fail";

row.innerHTML=`
<td>${tx.customer?.email || "unknown"}</td>
<td>₦${tx.amount/100}</td>
<td>${reason}</td>
<td>
<button onclick='manualFund("${tx.reference}")'>
Manual Fund
</button>
</td>
`;

}

async function manualFund(reference){

const verified = await verifyTransaction(reference);

const email = verified.customer.email;

const amount = verified.amount/100;

const userQuery = await db.collection("users")
.where("email","==",email)
.get();

if(userQuery.empty){

alert("User not found");

return;

}

const userDoc = userQuery.docs[0];

await db.runTransaction(async(t)=>{

const snap = await t.get(userDoc.ref);

const balance = snap.data().walletBalance || 0;

t.update(userDoc.ref,{
walletBalance:balance+amount
});

t.set(
db.collection("transactions").doc(reference),
{
email,
amount,
reference,
date:Date.now()
}
);

});

alert("Wallet funded");

}

async function retryAllFailed(){

const rows = document.querySelectorAll("#failedTable tr");

for(let i=1;i<rows.length;i++){

const ref = rows[i].cells[3]
.querySelector("button")
.getAttribute("onclick")
.match(/"(.*?)"/)[1];

await manualFund(ref);

}

}

</script>

</body>
</html>
