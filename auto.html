<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Creator Auto Funding</title>

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script src="firebase-config.js"></script>
<script src="pay.js"></script>

<style>

body{
background:#0b0b14;
color:white;
font-family:Arial;
margin:0;
padding:20px;
}

.dashboard{
max-width:1200px;
margin:auto;
}

.top{
display:flex;
justify-content:space-between;
margin-bottom:30px;
}

button{
background:#7c3aed;
border:none;
padding:10px 18px;
color:white;
border-radius:8px;
cursor:pointer;
}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:30px;
}

.card{
background:#1e1e2d;
padding:20px;
border-radius:12px;
}

table{
width:100%;
border-collapse:collapse;
background:#161622;
}

th,td{
padding:12px;
border-bottom:1px solid #2a2a40;
}

.status-success{color:#4ade80}
.status-failed{color:#f87171}
.status-pending{color:#facc15}

.failed-section{
margin-top:40px;
}

.small-btn{
background:#2563eb;
border:none;
padding:6px 12px;
border-radius:6px;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="dashboard">

<div class="top">

<h2>Creator Auto Funding</h2>

<div>

<button id="fetchBtn">Fetch Paystack</button>
<button id="retryBtn">Retry Failed</button>
<button id="refreshBtn">Refresh</button>

</div>

</div>


<div class="stats">

<div class="card">
<h3 id="totalTx">0</h3>
<p>Total Transactions</p>
</div>

<div class="card">
<h3 id="successTx">0</h3>
<p>Successful</p>
</div>

<div class="card">
<h3 id="failedTx">0</h3>
<p>Failed</p>
</div>

<div class="card">
<h3 id="totalAmount">₦0</h3>
<p>Total Funded</p>
</div>

</div>


<table>

<thead>

<tr>
<th>Transaction</th>
<th>Email</th>
<th>Amount</th>
<th>Status</th>
<th>Funding</th>
<th>Date</th>
</tr>

</thead>

<tbody id="txTable"></tbody>

</table>



<div class="failed-section">

<h3>Failed Funding</h3>

<table>

<thead>
<tr>
<th>Transaction</th>
<th>Email</th>
<th>Amount</th>
<th>Reason</th>
<th>Action</th>
</tr>
</thead>

<tbody id="failedTable"></tbody>

</table>

</div>

</div>



<script>

firebase.initializeApp(firebaseConfig)

const db=firebase.firestore()
const auth=firebase.auth()

const CREATOR_EMAIL="mynumba100@gmail.com"

let transactions=[]

const txTable=document.getElementById("txTable")
const failedTable=document.getElementById("failedTable")

const totalTx=document.getElementById("totalTx")
const successTx=document.getElementById("successTx")
const failedTx=document.getElementById("failedTx")
const totalAmount=document.getElementById("totalAmount")



auth.onAuthStateChanged(user=>{

if(!user || user.email!==CREATOR_EMAIL){

alert("Creator login required")

location.href="index.html"

return

}

loadTransactions()

listenRealtime()

})



function listenRealtime(){

db.collection("transactions")

.orderBy("timestamp","desc")

.onSnapshot(snap=>{

transactions=[]

snap.forEach(doc=>{

transactions.push({
id:doc.id,
...doc.data()
})

})

render()

})

}



async function loadTransactions(){

const snap=await db.collection("transactions")

.orderBy("timestamp","desc")

.get()

transactions=[]

snap.forEach(doc=>{

transactions.push({
id:doc.id,
...doc.data()
})

})

render()

}



function render(){

txTable.innerHTML=""
failedTable.innerHTML=""

let success=0
let failed=0
let amount=0

transactions.forEach(t=>{

if(t.funded) success++
else failed++

if(t.funded) amount+=t.amount||0

const date=t.timestamp?.toDate ?

t.timestamp.toDate().toLocaleString()

:"-"


txTable.innerHTML+=`

<tr>

<td>${t.paystackTransactionId||"-"}</td>
<td>${t.email||"-"}</td>
<td>₦${(t.amount||0).toLocaleString()}</td>

<td class="status-${t.status}">${t.status}</td>

<td>${t.funded?"funded":"failed"}</td>

<td>${date}</td>

</tr>

`


if(!t.funded){

failedTable.innerHTML+=`

<tr>

<td>${t.paystackTransactionId}</td>
<td>${t.email}</td>
<td>₦${t.amount}</td>
<td>${t.reason}</td>

<td>

<button class="small-btn"

onclick="manualFund('${t.paystackTransactionId}','${t.email}')">

Manual Fund

</button>

</td>

</tr>

`

}

})


totalTx.innerText=transactions.length
successTx.innerText=success
failedTx.innerText=failed
totalAmount.innerText="₦"+amount.toLocaleString()

}



async function fetchPaystack(){

const list=await window.paystack.fetchTransactions()

for(const tx of list){

await processTransaction(tx)

}

}



async function processTransaction(tx){

const ref=tx.reference

const existing=await db.collection("transactions")

.doc(ref)

.get()

if(existing.exists){

return

}

const verify=await window.paystack.verifyTransaction(ref)

if(!verify || verify.data.status!=="success"){

await db.collection("transactions")

.doc(ref)

.set({

paystackTransactionId:ref,
email:tx.customer?.email||"",
amount:(tx.amount||0)/100,
status:"failed",
funded:false,
reason:"Transaction not successful",
timestamp:firebase.firestore.FieldValue.serverTimestamp()

})

return

}

const email=verify.data.customer.email

const amount=verify.data.amount/100

const userSnap=await db.collection("users")

.where("email","==",email)

.get()

if(userSnap.empty){

await db.collection("transactions")

.doc(ref)

.set({

paystackTransactionId:ref,
email,
amount,
status:"failed",
funded:false,
reason:"User not found",
timestamp:firebase.firestore.FieldValue.serverTimestamp()

})

return

}

const user=userSnap.docs[0]

await db.runTransaction(async(transaction)=>{

const userRef=db.collection("users").doc(user.id)

const userData=await transaction.get(userRef)

const balance=userData.data().walletBalance||0

transaction.update(userRef,{

walletBalance:balance+amount

})

transaction.set(

db.collection("transactions").doc(ref),

{

paystackTransactionId:ref,
email,
amount,
status:"success",
funded:true,
reason:"Auto funded",
timestamp:firebase.firestore.FieldValue.serverTimestamp()

})

})

}



window.manualFund=async(ref,email)=>{

const verify=await window.paystack.verifyTransaction(ref)

if(!verify || verify.data.status!=="success"){

alert("Transaction invalid")

return

}

await processTransaction(verify.data)

}



async function retryFailed(){

const failed=transactions.filter(t=>!t.funded)

for(const tx of failed){

await processTransaction({

reference:tx.paystackTransactionId,
customer:{email:tx.email},
amount:tx.amount*100

})

}

}



document.getElementById("fetchBtn").onclick=fetchPaystack
document.getElementById("retryBtn").onclick=retryFailed
document.getElementById("refreshBtn").onclick=loadTransactions

</script>

</body>
</html>
