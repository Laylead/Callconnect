<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Funding Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="pay.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #f97316;
            margin-bottom: 20px;
        }
        .error-box {
            background: #7f1d1d;
            color: #fecaca;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #f97316;
        }
        .stat-card h3 {
            margin: 0 0 10px 0;
            color: #94a3b8;
            font-size: 0.9rem;
        }
        .stat-card .value {
            font-size: 2rem;
            font-weight: bold;
            color: white;
        }
        button {
            background: #f97316;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        button.secondary {
            background: #334155;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #1e293b;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 20px;
        }
        th {
            background: #0f172a;
            color: #94a3b8;
            font-weight: 600;
            padding: 15px;
            text-align: left;
        }
        td {
            padding: 15px;
            border-bottom: 1px solid #334155;
        }
        .success { color: #4ade80; }
        .failed { color: #f87171; }
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #1e293b;
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            border-left: 4px solid #f97316;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 Creator Funding Dashboard</h1>
        
        <div id="errorBox" class="error-box"></div>
        
        <div class="stats">
            <div class="stat-card">
                <h3>TOTAL TRANSACTIONS</h3>
                <div class="value" id="totalTx">0</div>
            </div>
            <div class="stat-card">
                <h3>SUCCESSFUL</h3>
                <div class="value" id="successCount">0</div>
            </div>
            <div class="stat-card">
                <h3>FAILED</h3>
                <div class="value" id="failedCount">0</div>
            </div>
            <div class="stat-card">
                <h3>TOTAL FUNDED</h3>
                <div class="value" id="totalAmount">₦0</div>
            </div>
        </div>

        <div>
            <button onclick="testConnection()" id="testBtn">🔌 Test Connection</button>
            <button onclick="loadTransactions()" id="fetchBtn">📥 Fetch New Transactions</button>
            <button onclick="retryAllFailed()" class="secondary" id="retryBtn">🔄 Auto Fund Failed</button>
            <button onclick="refreshView()" class="secondary">↻ Refresh View</button>
        </div>

        <h2>✅ Successful Funding</h2>
        <table id="successTable">
            <thead>
                <tr>
                    <th>Email</th>
                    <th>Amount</th>
                    <th>Reference</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody id="successBody"></tbody>
        </table>

        <h2>❌ Failed Transactions</h2>
        <table id="failedTable">
            <thead>
                <tr>
                    <th>Email</th>
                    <th>Amount</th>
                    <th>Reason</th>
                    <th>Reference</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="failedBody"></tbody>
        </table>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const db = firebase.firestore();
        let lastTimestamp = 0;

        // Show toast message
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.display = 'block';
            toast.style.borderLeftColor = type === 'error' ? '#ef4444' : '#f97316';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        // Show error
        function showError(message) {
            const errorBox = document.getElementById('errorBox');
            errorBox.textContent = message;
            errorBox.style.display = 'block';
            setTimeout(() => {
                errorBox.style.display = 'none';
            }, 5000);
        }

        // Test Paystack connection
        async function testConnection() {
            const testBtn = document.getElementById('testBtn');
            testBtn.disabled = true;
            testBtn.textContent = '⏳ Testing...';
            
            try {
                const isConnected = await paystack.testConnection();
                if (isConnected) {
                    showToast('✅ Paystack connection successful!', 'success');
                } else {
                    showError('❌ Paystack connection failed. Check your secret key.');
                }
            } catch (error) {
                showError('Connection test failed: ' + error.message);
            } finally {
                testBtn.disabled = false;
                testBtn.textContent = '🔌 Test Connection';
            }
        }

        // Load last timestamp from Firebase
        async function loadLastTimestamp() {
            try {
                const doc = await db.collection('system').doc('funding').get();
                if (doc.exists) {
                    lastTimestamp = doc.data().lastTimestamp || 0;
                }
            } catch (error) {
                console.error('Error loading timestamp:', error);
            }
        }

        // Save timestamp
        async function saveTimestamp(ts) {
            try {
                await db.collection('system').doc('funding').set({
                    lastTimestamp: ts
                }, { merge: true });
            } catch (error) {
                console.error('Error saving timestamp:', error);
            }
        }

        // Load all stored transactions
        async function loadStoredTransactions() {
            try {
                const snapshot = await db.collection('transactions')
                    .orderBy('date', 'desc')
                    .limit(100)
                    .get();
                
                const transactions = [];
                snapshot.forEach(doc => transactions.push({ id: doc.id, ...doc.data() }));
                
                updateTables(transactions);
            } catch (error) {
                console.error('Error loading stored transactions:', error);
                showError('Failed to load transactions from Firebase');
            }
        }

        // Update UI tables
        function updateTables(transactions) {
            const successList = transactions.filter(t => t.funded === true);
            const failedList = transactions.filter(t => t.status === 'failed' || t.funded === false);

            // Update stats
            document.getElementById('totalTx').textContent = transactions.length;
            document.getElementById('successCount').textContent = successList.length;
            document.getElementById('failedCount').textContent = failedList.length;
            
            const totalFunded = successList.reduce((sum, t) => sum + (t.amount || 0), 0);
            document.getElementById('totalAmount').textContent = `₦${totalFunded.toLocaleString()}`;

            // Success table
            const successBody = document.getElementById('successBody');
            successBody.innerHTML = successList.map(t => `
                <tr>
                    <td>${t.email || '—'}</td>
                    <td class="success">₦${(t.amount || 0).toLocaleString()}</td>
                    <td>${t.reference || '—'}</td>
                    <td>${t.date ? new Date(t.date).toLocaleString() : '—'}</td>
                </tr>
            `).join('') || '<tr><td colspan="4" style="text-align:center">No successful transactions</td></tr>';

            // Failed table
            const failedBody = document.getElementById('failedBody');
            failedBody.innerHTML = failedList.map(t => `
                <tr>
                    <td>${t.email || '—'}</td>
                    <td>₦${(t.amount || 0).toLocaleString()}</td>
                    <td class="failed">${t.reason || 'Unknown error'}</td>
                    <td>${t.reference || '—'}</td>
                    <td>
                        <button onclick="manualFund('${t.reference}', '${t.email}')" style="padding:5px 10px;font-size:0.9rem">
                            Manual Fund
                        </button>
                    </td>
                </tr>
            `).join('') || '<tr><td colspan="5" style="text-align:center">No failed transactions</td></tr>';
        }

        // Load new transactions from Paystack
        async function loadTransactions() {
            const fetchBtn = document.getElementById('fetchBtn');
            fetchBtn.disabled = true;
            fetchBtn.textContent = '⏳ Fetching...';
            
            try {
                await loadLastTimestamp();
                
                // Fetch from Paystack
                const transactions = await paystack.fetchTransactions({
                    perPage: 50,
                    status: 'success'
                });

                if (!transactions || transactions.length === 0) {
                    showToast('No new transactions found', 'info');
                    return;
                }

                let processed = 0;
                for (const tx of transactions) {
                    // Skip older transactions
                    if (tx.paidAt && new Date(tx.paidAt).getTime() <= lastTimestamp) {
                        continue;
                    }

                    // Check if already exists
                    const existing = await db.collection('transactions').doc(tx.reference).get();
                    if (existing.exists) continue;

                    // Process the transaction
                    await processTransaction(tx);
                    processed++;
                }

                showToast(`✅ Processed ${processed} new transactions`, 'success');
                await loadStoredTransactions();

            } catch (error) {
                console.error('Error loading transactions:', error);
                showError('Failed to load transactions: ' + error.message);
            } finally {
                fetchBtn.disabled = false;
                fetchBtn.textContent = '📥 Fetch New Transactions';
            }
        }

        // Process single transaction
        async function processTransaction(tx) {
            try {
                // Verify with Paystack
                const verified = await paystack.verifyTransaction(tx.reference);
                
                if (!verified.status || !verified.data) {
                    await storeFailedTx(tx, 'Verification failed');
                    return;
                }

                const txData = verified.data;
                
                // Validate
                if (txData.status !== 'success') {
                    await storeFailedTx(tx, 'Transaction not successful');
                    return;
                }

                const email = txData.customer?.email;
                if (!email) {
                    await storeFailedTx(tx, 'Missing email');
                    return;
                }

                const amount = txData.amount / 100; // Convert from kobo
                if (!amount || amount <= 0) {
                    await storeFailedTx(tx, 'Invalid amount');
                    return;
                }

                // Find user
                const userSnap = await db.collection('users').where('email', '==', email).get();
                if (userSnap.empty) {
                    await storeFailedTx(tx, 'User not found');
                    return;
                }

                const userDoc = userSnap.docs[0];

                // Fund wallet
                await db.runTransaction(async (transaction) => {
                    const userRef = db.collection('users').doc(userDoc.id);
                    const userData = await transaction.get(userRef);
                    const currentBalance = userData.data()?.walletBalance || 0;

                    transaction.update(userRef, {
                        walletBalance: currentBalance + amount
                    });

                    transaction.set(db.collection('transactions').doc(tx.reference), {
                        email: email,
                        amount: amount,
                        reference: tx.reference,
                        date: Date.now(),
                        funded: true,
                        status: 'success'
                    });
                });

                // Update timestamp if needed
                if (txData.paidAt) {
                    const ts = new Date(txData.paidAt).getTime();
                    if (ts > lastTimestamp) {
                        lastTimestamp = ts;
                        await saveTimestamp(ts);
                    }
                }

                console.log(`✅ Funded ${email} ₦${amount}`);

            } catch (error) {
                console.error('Process error:', error);
                await storeFailedTx(tx, error.message);
            }
        }

        // Store failed transaction
        async function storeFailedTx(tx, reason) {
            try {
                await db.collection('transactions').doc(tx.reference).set({
                    email: tx.customer?.email || 'unknown',
                    amount: (tx.amount || 0) / 100,
                    reference: tx.reference,
                    date: Date.now(),
                    funded: false,
                    status: 'failed',
                    reason: reason
                }, { merge: true });
            } catch (error) {
                console.error('Error storing failed tx:', error);
            }
        }

        // Manual fund
        async function manualFund(reference, email) {
            if (!reference) {
                showError('Invalid reference');
                return;
            }

            try {
                showToast('Processing manual fund...', 'info');
                
                const verified = await paystack.verifyTransaction(reference);
                
                if (!verified.status || !verified.data) {
                    showError('Verification failed');
                    return;
                }

                const txData = verified.data;
                const amount = txData.amount / 100;

                // Find user
                const userSnap = await db.collection('users').where('email', '==', email).get();
                if (userSnap.empty) {
                    showError('User not found');
                    return;
                }

                const userDoc = userSnap.docs[0];

                // Fund wallet
                await db.runTransaction(async (transaction) => {
                    const userRef = db.collection('users').doc(userDoc.id);
                    const userData = await transaction.get(userRef);
                    const currentBalance = userData.data()?.walletBalance || 0;

                    transaction.update(userRef, {
                        walletBalance: currentBalance + amount
                    });

                    transaction.set(db.collection('transactions').doc(reference), {
                        email: email,
                        amount: amount,
                        reference: reference,
                        date: Date.now(),
                        funded: true,
                        status: 'success',
                        reason: 'Manually funded'
                    }, { merge: true });
                });

                showToast(`✅ Funded ₦${amount}`, 'success');
                await loadStoredTransactions();

            } catch (error) {
                console.error('Manual fund error:', error);
                showError('Manual fund failed: ' + error.message);
            }
        }

        // Retry all failed
        async function retryAllFailed() {
            const retryBtn = document.getElementById('retryBtn');
            retryBtn.disabled = true;
            retryBtn.textContent = '⏳ Processing...';
            
            try {
                const snapshot = await db.collection('transactions')
                    .where('funded', '==', false)
                    .limit(50)
                    .get();

                if (snapshot.empty) {
                    showToast('No failed transactions', 'info');
                    return;
                }

                let retried = 0;
                for (const doc of snapshot.docs) {
                    const data = doc.data();
                    if (data.reference) {
                        await manualFund(data.reference, data.email);
                        retried++;
                    }
                }

                showToast(`Retried ${retried} transactions`, 'success');
                await loadStoredTransactions();

            } catch (error) {
                console.error('Retry error:', error);
                showError('Failed to retry transactions');
            } finally {
                retryBtn.disabled = false;
                retryBtn.textContent = '🔄 Auto Fund Failed';
            }
        }

        // Refresh view
        async function refreshView() {
            await loadStoredTransactions();
            showToast('View refreshed', 'success');
        }

        // Initialize
        loadStoredTransactions();

        // Make functions global
        window.loadTransactions = loadTransactions;
        window.retryAllFailed = retryAllFailed;
        window.refreshView = refreshView;
        window.manualFund = manualFund;
        window.testConnection = testConnection;
    </script>
</body>
</html>
