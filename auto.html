<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Creator Auto Funding</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script src="firebase-config.js"></script>
<script src="pay.js"></script>

<style>

body{
background:#0b0b14;
color:white;
font-family:Arial;
margin:0;
padding:20px;
}

.dashboard{
max-width:1100px;
margin:auto;
}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:25px;
}

.card{
background:#1c1c28;
padding:20px;
border-radius:12px;
}

table{
width:100%;
border-collapse:collapse;
background:#151520;
}

th,td{
padding:12px;
border-bottom:1px solid #2a2a40;
}

button{
background:#6c4cff;
border:none;
padding:8px 14px;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="dashboard">

<h2>Creator Funding Dashboard</h2>

<div class="stats">

<div class="card">
<h3 id="totalTx">0</h3>
<p>Total Transactions</p>
</div>

<div class="card">
<h3 id="successTx">0</h3>
<p>Successful</p>
</div>

<div class="card">
<h3 id="failedTx">0</h3>
<p>Failed</p>
</div>

<div class="card">
<h3 id="totalAmount">₦0</h3>
<p>Total Funded</p>
</div>

</div>

<table>

<thead>
<tr>
<th>Reference</th>
<th>Email</th>
<th>Amount</th>
<th>Status</th>
<th>Date</th>
</tr>
</thead>

<tbody id="txTable"></tbody>

</table>

</div>


<script>

firebase.initializeApp(firebaseConfig)

const db = firebase.firestore()
const auth = firebase.auth()

const CREATOR_EMAIL="mynumba100@gmail.com"

let transactions=[]
let latestReference=null

const txTable=document.getElementById("txTable")

const totalTx=document.getElementById("totalTx")
const successTx=document.getElementById("successTx")
const failedTx=document.getElementById("failedTx")
const totalAmount=document.getElementById("totalAmount")


auth.onAuthStateChanged(user=>{

if(!user || user.email!==CREATOR_EMAIL){

alert("Creator login required")
location.href="index.html"
return

}

listenRealtime()

startPaystackWatcher()

})


function listenRealtime(){

db.collection("transactions")
.orderBy("timestamp","desc")
.onSnapshot(snap=>{

transactions=[]

snap.forEach(doc=>{
transactions.push(doc.data())
})

render()

})

}


function render(){

txTable.innerHTML=""

let success=0
let failed=0
let amount=0

transactions.forEach(t=>{

if(t.funded) success++
else failed++

if(t.funded) amount+=t.amount

const date=t.timestamp?.toDate ?
t.timestamp.toDate().toLocaleString():"-"

txTable.innerHTML+=`

<tr>
<td>${t.reference}</td>
<td>${t.email}</td>
<td>₦${t.amount}</td>
<td>${t.status}</td>
<td>${date}</td>
</tr>

`

})

totalTx.innerText=transactions.length
successTx.innerText=success
failedTx.innerText=failed
totalAmount.innerText="₦"+amount.toLocaleString()

}


async function startPaystackWatcher(){

setInterval(async()=>{

try{

const list=await window.paystack.getTransactions()

if(!list.length) return

for(const tx of list){

await handleTransaction(tx)

}

}catch(e){

console.log("Paystack error",e)

}

},30000)

}



async function handleTransaction(tx){

const ref=tx.reference

const existing=await db.collection("transactions").doc(ref).get()

if(existing.exists) return


const verify=await window.paystack.verify(ref)

if(!verify || verify.data.status!=="success"){

await db.collection("transactions").doc(ref).set({

reference:ref,
email:tx.customer?.email||"",
amount:(tx.amount||0)/100,
status:"failed",
funded:false,
timestamp:firebase.firestore.FieldValue.serverTimestamp()

})

return

}


const email=verify.data.customer.email
const amount=verify.data.amount/100

const userSnap=await db.collection("users")
.where("email","==",email)
.get()

if(userSnap.empty){

await db.collection("transactions").doc(ref).set({

reference:ref,
email,
amount,
status:"failed",
funded:false,
reason:"User not found",
timestamp:firebase.firestore.FieldValue.serverTimestamp()

})

return

}


const user=userSnap.docs[0]

await db.runTransaction(async(t)=>{

const userRef=db.collection("users").doc(user.id)

const data=await t.get(userRef)

const balance=data.data().walletBalance||0

t.update(userRef,{
walletBalance:balance+amount
})

t.set(db.collection("transactions").doc(ref),{

reference:ref,
email,
amount,
status:"success",
funded:true,
timestamp:firebase.firestore.FieldValue.serverTimestamp()

})

})

}

</script>

</body>
</html>
