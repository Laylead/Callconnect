<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>CrowdShop · Discover</title>
    <!-- Material Icons + Google Font -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    
    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <!-- External Configurations -->
    <script src="firebase-config.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background: #f5f7fa;
            min-height: 100vh;
        }

        .app {
            max-width: 480px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.05);
        }

        /* ===== HEADER ===== */
        .header {
            position: sticky;
            top: 0;
            background: white;
            z-index: 50;
            padding: 16px 16px 8px;
            border-bottom: 1px solid rgba(203, 213, 225, 0.3);
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.95);
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            margin-bottom: 12px;
        }

        .wallet-badge {
            background: linear-gradient(145deg, #2463eb, #4f46e5);
            padding: 10px 18px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 20px -8px #2463eb80;
            font-size: 0.9rem;
        }

        .wallet-badge .material-icons {
            font-size: 20px;
        }

        .search-bar {
            display: flex;
            align-items: center;
            background: #f1f5f9;
            border-radius: 30px;
            padding: 8px 16px;
            gap: 8px;
            border: 1px solid #e2e8f0;
        }

        .search-bar .material-icons {
            font-size: 20px;
            color: #64748b;
        }

        .search-bar input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 15px;
            outline: none;
            color: #0f172a;
        }

        /* ===== FILTER BUTTON ===== */
        .filter-btn-container {
            padding: 8px 16px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #f1f5f9;
        }

        .filter-chip-btn {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            color: #334155;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .active-filters {
            display: flex;
            align-items: center;
            gap: 8px;
            overflow-x: auto;
        }

        .filter-tag {
            background: #eef2ff;
            color: #2463eb;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        /* ===== CATEGORIES SCROLL ===== */
        .categories-section {
            padding: 16px 16px 8px;
        }

        .categories-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .categories-scroll::-webkit-scrollbar {
            display: none;
        }

        .category-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            min-width: 64px;
            cursor: pointer;
        }

        .category-icon {
            width: 56px;
            height: 56px;
            background: #f8fafc;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #e2e8f0;
        }

        .category-item.active .category-icon {
            background: #2463eb;
            border-color: #2463eb;
            color: white;
        }

        .category-item.active .category-name {
            color: #2463eb;
            font-weight: 600;
        }

        .category-icon .material-icons {
            font-size: 24px;
            color: #475569;
        }

        .category-item.active .category-icon .material-icons {
            color: white;
        }

        .category-name {
            font-size: 12px;
            font-weight: 500;
            color: #64748b;
        }

        /* ===== BANNER SLIDER ===== */
        .banner-swiper {
            margin: 8px 16px 16px;
            border-radius: 20px;
            overflow: hidden;
        }

        .banner-slide {
            height: 140px;
            background: linear-gradient(145deg, #2463eb, #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: 600;
        }

        /* ===== PRODUCTS GRID ===== */
        .products-section {
            padding: 8px 12px 90px;
        }

        .section-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .section-title h2 {
            font-size: 18px;
            font-weight: 700;
            color: #0f172a;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .product-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #edf2f7;
            cursor: pointer;
        }

        .product-image {
            width: 100%;
            aspect-ratio: 1/1;
            background-size: cover;
            background-position: center;
            background-color: #f1f5f9;
            position: relative;
        }

        .product-tag {
            position: absolute;
            top: 8px;
            left: 8px;
            background: linear-gradient(145deg, #e53e3e, #dc2626);
            color: white;
            font-size: 10px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 40px;
        }

        .product-info {
            padding: 12px 8px 10px;
        }

        .product-price {
            font-size: 16px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
        }

        .product-original-price {
            font-size: 12px;
            color: #94a3b8;
            text-decoration: line-through;
        }

        .product-discount {
            font-size: 10px;
            font-weight: 700;
            color: #10b981;
            background: #d1fae5;
            padding: 2px 6px;
            border-radius: 40px;
        }

        .product-name {
            font-size: 13px;
            color: #334155;
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 36px;
        }

        .product-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 11px;
            color: #64748b;
        }

        .progress-container {
            margin-top: 8px;
            height: 4px;
            background: #f1f5f9;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #2463eb, #7c3aed);
        }

        /* ===== PRODUCT DETAIL MODAL ===== */
        .product-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: flex-end;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .product-modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .product-modal-sheet {
            background: white;
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            border-radius: 30px 30px 0 0;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 90vh;
            overflow-y: auto;
        }

        .product-modal-overlay.show .product-modal-sheet {
            transform: translateY(0);
        }

        .product-modal-header {
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #f1f5f9;
            position: sticky;
            top: 0;
            background: white;
            z-index: 10;
        }

        .product-modal-header h3 {
            font-size: 18px;
            font-weight: 700;
            color: #0f172a;
            flex: 1;
            margin-right: 12px;
        }

        .product-modal-close {
            width: 40px;
            height: 40px;
            border-radius: 40px;
            background: #f1f5f9;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #475569;
            flex-shrink: 0;
        }

        .product-modal-image {
            width: 100%;
            height: 250px;
            background-size: cover;
            background-position: center;
            background-color: #f1f5f9;
        }

        .product-modal-content {
            padding: 20px;
        }

        .product-modal-price {
            font-size: 24px;
            font-weight: 700;
            color: #2463eb;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .product-modal-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            background: #f8fcff;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-weight: 700;
            font-size: 16px;
            color: #0f172a;
        }

        .stat-label {
            font-size: 12px;
            color: #64748b;
            margin-top: 4px;
        }

        .product-modal-shipping {
            background: #f1f5f9;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #334155;
        }

        .units-selector {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            padding: 16px;
            background: #f8fafc;
            border-radius: 20px;
        }

        .units-input {
            width: 80px;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 30px;
            text-align: center;
            font-weight: 600;
            font-size: 16px;
            outline: none;
        }

        .max-units {
            background: #eef2ff;
            color: #2463eb;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .price-breakdown {
            background: #f8fcff;
            border-radius: 20px;
            padding: 16px;
            margin: 16px 0;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            color: #475569;
            font-size: 14px;
        }

        .price-row.total {
            margin-top: 8px;
            padding-top: 12px;
            border-top: 1px dashed #cbd5e1;
            font-weight: 700;
            color: #0f172a;
        }

        .total-value {
            color: #2463eb;
        }

        .available-badge {
            background: #eef2ff;
            color: #2463eb;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 16px;
        }

        .order-form {
            background: #f8fcff;
            border-radius: 24px;
            padding: 20px;
            margin: 20px 0;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 30px;
            font-size: 14px;
            outline: none;
            margin-bottom: 12px;
        }

        .product-modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .product-modal-btn {
            flex: 1;
            padding: 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .product-modal-btn-primary {
            background: linear-gradient(145deg, #2463eb, #4f46e5);
            color: white;
        }

        .product-modal-btn-secondary {
            background: #f1f5f9;
            color: #334155;
        }

        /* PIN input styles */
        .pin-container {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 24px 0;
        }

        .pin-digit {
            width: 60px;
            height: 70px;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            line-height: 70px;
            color: #0f172a;
            background: white;
        }

        .pin-digit.filled {
            border-color: #2463eb;
        }

        .pin-digit input {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            outline: none;
            border-radius: 20px;
        }

        /* Attempts badge */
        .attempts-badge {
            background: rgba(254, 226, 226, 0.95);
            color: #b91c1c;
            padding: 8px 16px;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 16px;
        }

        /* Swipe button */
        .swipe-container {
            margin: 24px 0 16px;
            position: relative;
            width: 100%;
            height: 64px;
            background: #f1f5f9;
            border-radius: 40px;
            overflow: hidden;
            user-select: none;
            border: 1px solid #e2e8f0;
        }

        .swipe-track {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #2463eb, #7c3aed);
            border-radius: 40px;
            transform: translateX(-100%);
            pointer-events: none;
        }

        .swipe-thumb {
            position: absolute;
            top: 4px;
            left: 4px;
            width: 56px;
            height: 56px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .swipe-thumb .material-icons {
            color: #2463eb;
            font-size: 28px;
        }

        .swipe-text {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #475569;
            font-weight: 600;
            pointer-events: none;
            z-index: 1;
        }

        /* Animated checkmark */
        .checkmark-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
        }

        .checkmark-svg {
            width: 100px;
            height: 100px;
            margin-bottom: 24px;
        }

        .checkmark-circle {
            stroke-dasharray: 166;
            stroke-dashoffset: 166;
            stroke-width: 2;
            stroke: #2463eb;
            fill: none;
            animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
        }

        .checkmark-check {
            transform-origin: 50% 50%;
            stroke-dasharray: 48;
            stroke-dashoffset: 48;
            stroke-width: 3;
            stroke: #2463eb;
            fill: none;
            animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.4s forwards;
        }

        @keyframes stroke {
            100% { stroke-dashoffset: 0; }
        }

        .checkmark-text {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0f172a;
            margin-top: 16px;
            opacity: 0;
            animation: fadeIn 0.5s ease 0.6s forwards;
        }

        .checkmark-subtext {
            color: #64748b;
            margin-top: 8px;
            opacity: 0;
            animation: fadeIn 0.5s ease 0.8s forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Filter Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: flex-end;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal-bottom-sheet {
            background: white;
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            border-radius: 30px 30px 0 0;
            transform: translateY(100%);
            transition: transform 0.4s;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-overlay.show .modal-bottom-sheet {
            transform: translateY(0);
        }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 20px;
            right: 20px;
            max-width: 440px;
            margin: 0 auto;
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(16px);
            border-radius: 60px;
            padding: 14px 24px;
            color: white;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 2000;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 480px;
            margin: 0 auto;
            height: 78px;
            padding: 10px 16px;
            display: flex;
            justify-content: space-around;
            border-radius: 40px 40px 0 0;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(203, 213, 225, 0.5);
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 8px 0;
            font-size: 12px;
            color: #64748b;
            cursor: pointer;
            background: none;
            border: none;
        }

        .nav-item .material-icons {
            font-size: 24px;
        }

        .nav-item.active {
            color: #2463eb;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- HEADER -->
        <div class="header">
            <div class="header-top">
                <div class="wallet-badge" onclick="window.location.href='wallet.html'">
                    <span class="material-icons">account_balance_wallet</span>
                    <span id="walletBalance">₦0</span>
                </div>
            </div>
            
            <div class="search-bar">
                <span class="material-icons">search</span>
                <input type="text" id="searchInput" placeholder="Search products...">
            </div>
        </div>

        <!-- FILTER BUTTON -->
        <div class="filter-btn-container">
            <button class="filter-chip-btn" onclick="openFilterModal()">
                <span class="material-icons">filter_list</span>
                Filter
            </button>
            <div class="active-filters" id="activeFiltersContainer"></div>
        </div>

        <!-- CATEGORIES -->
        <div class="categories-section">
            <div class="categories-scroll" id="categoriesScroll"></div>
        </div>

        <!-- BANNER -->
        <div class="swiper banner-swiper">
            <div class="swiper-wrapper" id="bannerWrapper">
                <div class="swiper-slide banner-slide">Flash Sale - Up to 50% Off</div>
                <div class="swiper-slide banner-slide">New Arrivals - Shop Now</div>
                <div class="swiper-slide banner-slide">Premium Quality - Cheap Price</div>
            </div>
            <div class="swiper-pagination"></div>
        </div>

        <!-- PRODUCTS -->
        <div class="products-section">
            <div class="section-title">
                <h2>Recommended for You</h2>
                <span class="material-icons">arrow_forward</span>
            </div>
            
            <div class="products-grid" id="productsGrid">
                <div class="loading-grid">
                    <div class="loading-card"></div>
                    <div class="loading-card"></div>
                    <div class="loading-card"></div>
                </div>
            </div>
        </div>

        <!-- BOTTOM NAV -->
        <div class="bottom-nav">
            <button class="nav-item" onclick="window.location.href='index.html'">
                <span class="material-icons">dashboard</span>
                <span>Home</span>
            </button>
            <button class="nav-item" onclick="window.location.href='orders.html'">
                <span class="material-icons">shopping_bag</span>
                <span>Orders</span>
            </button>
            <button class="nav-item" onclick="window.location.href='wallet.html'">
                <span class="material-icons">account_balance_wallet</span>
                <span>Wallet</span>
            </button>
            <button class="nav-item" onclick="window.location.href='track.html'">
                <span class="material-icons">local_shipping</span>
                <span>Track</span>
            </button>
            <button class="nav-item active" onclick="window.location.href='discover.html'">
                <span class="material-icons">explore</span>
                <span>Discover</span>
            </button>
        </div>
    </div>

    <!-- FILTER MODAL -->
    <div class="modal-overlay" id="filterModal">
        <div class="modal-bottom-sheet">
            <div class="modal-header">
                <h3>Filter & Sort</h3>
                <button class="modal-close" onclick="closeFilterModal()">✕</button>
            </div>
            <div class="modal-content">
                <!-- Add filter options here -->
            </div>
        </div>
    </div>

    <!-- PRODUCT MODAL -->
    <div class="product-modal-overlay" id="productModal">
        <div class="product-modal-sheet" id="productModalContent"></div>
    </div>

    <!-- PIN/SWIPE MODAL -->
    <div class="product-modal-overlay" id="pinSwipeModal">
        <div class="product-modal-sheet" id="pinSwipeContent"></div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast">
        <span class="material-icons" id="toastIcon">info</span>
        <span id="toastMessage"></span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        // ========== FIREBASE INIT ==========
        let db, auth;
        let currentUser = null;
        let userData = null;
        let allProducts = [];
        let filteredProducts = [];
        let categories = [];
        let selectedProduct = null;
        let currentPurchase = null;
        const SHIPPING_COST = 2500;
        const MAX_PIN_ATTEMPTS = 4;
        
        // Swipe variables
        let isSwiping = false;
        let swipeStartX = 0;
        let swipeCurrentX = 0;
        let swipeThumb = null;
        let swipeTrack = null;
        let swipeContainer = null;
        let maxSwipe = 0;
        let swipeCompleted = false;

        // Initialize Firebase
        try {
            if (typeof firebaseConfig !== 'undefined') {
                if (!firebase.apps.length) {
                    firebase.initializeApp(firebaseConfig);
                }
                db = firebase.firestore();
                auth = firebase.auth();
                console.log("Firebase initialized");
            }
        } catch (error) {
            console.error("Firebase init error:", error);
        }

        // ========== AUTH STATE ==========
        if (auth) {
            auth.onAuthStateChanged(async (user) => {
                if (user) {
                    currentUser = user;
                    await loadUserData();
                    await loadProducts();
                    
                    // Check if user is banned
                    if (userData?.banned) {
                        showToast('Account banned. Contact support.', 'error');
                        setTimeout(() => {
                            auth.signOut();
                            window.location.href = 'login.html';
                        }, 3000);
                    }
                } else {
                    window.location.href = 'login.html';
                }
            });
        }

        async function loadUserData() {
            if (!currentUser || !db) return;
            try {
                const userRef = db.collection('users').doc(currentUser.uid);
                const doc = await userRef.get();
                if (doc.exists) {
                    userData = doc.data();
                    document.getElementById('walletBalance').innerHTML = `₦${(userData.walletBalance || 0).toLocaleString()}`;
                }
            } catch (e) {
                console.error('Error loading user:', e);
            }
        }

        // ========== LOAD PRODUCTS ==========
        async function loadProducts() {
            try {
                const snapshot = await db.collection('campaigns').get();
                allProducts = [];
                
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (data.active !== false) {
                        const reserved = data.reserved || 0;
                        const goal = data.goal || 1;
                        
                        if (reserved < goal) {
                            allProducts.push({
                                id: doc.id,
                                name: data.name || 'Product',
                                price: data.price || 0,
                                goal: goal,
                                reserved: reserved,
                                img: data.img || 'https://placehold.co/400x400/2463eb/ffffff?text=Product',
                                description: data.description || 'No description',
                                shippingCost: data.shippingCost || SHIPPING_COST
                            });
                        }
                    }
                });
                
                filteredProducts = [...allProducts];
                renderProducts();
                
            } catch (error) {
                console.error("Error loading products:", error);
            }
        }

        // ========== RENDER PRODUCTS ==========
        function renderProducts() {
            const container = document.getElementById('productsGrid');
            
            if (filteredProducts.length === 0) {
                container.innerHTML = '<div class="empty-state">No products found</div>';
                return;
            }
            
            let html = '';
            filteredProducts.forEach(product => {
                const progress = Math.min(((product.reserved || 0) / product.goal * 100), 100).toFixed(0);
                const remaining = product.goal - (product.reserved || 0);
                
                html += `
                    <div class="product-card" onclick="viewProduct('${product.id}')">
                        <div class="product-image" style="background-image: url('${product.img}')"></div>
                        <div class="product-info">
                            <div class="product-price">₦${product.price.toLocaleString()}</div>
                            <div class="product-name">${product.name}</div>
                            <div class="product-meta">
                                <span>${product.reserved || 0}/${product.goal}</span>
                                <span>${remaining} left</span>
                            </div>
                            <div class="progress-container">
                                <div class="progress-fill" style="width: ${progress}%"></div>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        // ========== PRODUCT DETAIL ==========
        window.viewProduct = function(productId) {
            const product = allProducts.find(p => p.id === productId);
            if (!product) return;
            
            selectedProduct = product;
            
            const remaining = product.goal - (product.reserved || 0);
            
            const modalContent = document.getElementById('productModalContent');
            modalContent.innerHTML = `
                <div class="product-modal-header">
                    <h3>${product.name}</h3>
                    <button class="product-modal-close" onclick="closeProductModal()">✕</button>
                </div>
                <div class="product-modal-image" style="background-image: url('${product.img}')"></div>
                <div class="product-modal-content">
                    <div class="product-modal-price">₦${product.price.toLocaleString()}</div>
                    
                    <div class="product-modal-stats">
                        <div class="stat-item">
                            <div class="stat-value">${product.reserved || 0}</div>
                            <div class="stat-label">Joined</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${remaining}</div>
                            <div class="stat-label">Remaining</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${Math.round((product.reserved || 0)/product.goal*100)}%</div>
                            <div class="stat-label">Funded</div>
                        </div>
                    </div>
                    
                    <div class="product-modal-shipping">
                        <span class="material-icons">local_shipping</span>
                        <span>Shipping: ₦${product.shippingCost.toLocaleString()}</span>
                    </div>
                    
                    <p>${product.description}</p>
                    
                    <div class="units-selector">
                        <label>Units:</label>
                        <div style="display: flex; gap: 8px; align-items: center;">
                            <input type="number" id="orderUnits" class="units-input" min="1" max="${remaining}" value="1">
                            <span class="max-units" onclick="document.getElementById('orderUnits').value=${remaining}; updateTotalDisplay()">Max</span>
                        </div>
                    </div>
                    
                    <div class="price-breakdown">
                        <div class="price-row">
                            <span>Price per unit:</span>
                            <span>₦${product.price.toLocaleString()}</span>
                        </div>
                        <div class="price-row">
                            <span>Shipping per unit:</span>
                            <span>₦${product.shippingCost.toLocaleString()}</span>
                        </div>
                        <div class="price-row total" id="totalDisplay">
                            <span>Total:</span>
                            <span class="total-value">₦${(product.price + product.shippingCost).toLocaleString()}</span>
                        </div>
                    </div>
                    
                    <div class="order-form">
                        <input type="text" class="form-input" id="shippingName" placeholder="Full Name *" value="${userData?.fullName || ''}">
                        <input type="tel" class="form-input" id="shippingPhone" placeholder="Phone *" value="${userData?.phone || ''}">
                        <input type="email" class="form-input" id="shippingEmail" placeholder="Email *" value="${currentUser?.email || ''}">
                        <input type="text" class="form-input" id="shippingAddress" placeholder="Address *" value="${userData?.address || ''}">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                            <input type="text" class="form-input" id="shippingCity" placeholder="City *" value="${userData?.city || ''}">
                            <input type="text" class="form-input" id="shippingState" placeholder="State *" value="${userData?.state || ''}">
                        </div>
                    </div>
                    
                    <div class="product-modal-actions">
                        <button class="product-modal-btn product-modal-btn-secondary" onclick="closeProductModal()">Cancel</button>
                        <button class="product-modal-btn product-modal-btn-primary" onclick="validateAndProceed()">Continue</button>
                    </div>
                </div>
            `;
            
            document.getElementById('orderUnits').addEventListener('input', updateTotalDisplay);
            document.getElementById('productModal').classList.add('show');
        };

        function updateTotalDisplay() {
            if (!selectedProduct) return;
            const units = parseInt(document.getElementById('orderUnits')?.value) || 1;
            const total = (selectedProduct.price + selectedProduct.shippingCost) * units;
            document.querySelector('#totalDisplay .total-value').innerHTML = `₦${total.toLocaleString()}`;
        }

        window.closeProductModal = function() {
            document.getElementById('productModal').classList.remove('show');
            selectedProduct = null;
        };

        // ========== VALIDATE AND PROCEED ==========
        window.validateAndProceed = function() {
            if (!currentUser) {
                showToast('Please login first', 'error');
                return;
            }
            
            if (userData?.banned) {
                showToast('Account banned', 'error');
                return;
            }
            
            if (userData?.temporarilyBanned && userData.banExpiry?.toDate() > new Date()) {
                showToast('Account temporarily locked', 'error');
                return;
            }
            
            if (!selectedProduct) return;
            
            const units = parseInt(document.getElementById('orderUnits')?.value) || 1;
            const remaining = selectedProduct.goal - (selectedProduct.reserved || 0);
            
            if (units > remaining) {
                showToast(`Only ${remaining} units available`, 'warning');
                return;
            }
            
            // Get form values
            const name = document.getElementById('shippingName')?.value;
            const phone = document.getElementById('shippingPhone')?.value;
            const email = document.getElementById('shippingEmail')?.value;
            const address = document.getElementById('shippingAddress')?.value;
            const city = document.getElementById('shippingCity')?.value;
            const state = document.getElementById('shippingState')?.value;
            
            if (!name || !phone || !email || !address || !city || !state) {
                showToast('Fill all fields', 'warning');
                return;
            }
            
            const total = (selectedProduct.price + selectedProduct.shippingCost) * units;
            
            if ((userData?.walletBalance || 0) < total) {
                showToast('Insufficient balance', 'error');
                return;
            }
            
            // Save purchase data
            currentPurchase = {
                productId: selectedProduct.id,
                units: units,
                total: total,
                shippingDetails: { name, phone, email, address, city, state }
            };
            
            closeProductModal();
            
            if (userData?.pin) {
                showPinEntry();
            } else {
                showCreatePin();
            }
        };

        // ========== PIN FUNCTIONS ==========
        window.showCreatePin = function() {
            const modalContent = document.getElementById('pinSwipeContent');
            modalContent.innerHTML = `
                <div class="product-modal-header">
                    <h3>Create PIN</h3>
                    <button class="product-modal-close" onclick="closePinSwipeModal()">✕</button>
                </div>
                <div class="product-modal-content">
                    <div style="text-align:center; margin:20px 0; font-size:1.2rem;">
                        Total: ₦${currentPurchase.total.toLocaleString()}
                    </div>
                    <p style="text-align:center; margin-bottom:20px;">Create a 4-digit PIN</p>
                    <div class="pin-container">
                        <div class="pin-digit"><input type="text" id="pin1" maxlength="1" oninput="moveToNext(this,2)" inputmode="numeric"></div>
                        <div class="pin-digit"><input type="text" id="pin2" maxlength="1" oninput="moveToNext(this,3)" inputmode="numeric"></div>
                        <div class="pin-digit"><input type="text" id="pin3" maxlength="1" oninput="moveToNext(this,4)" inputmode="numeric"></div>
                        <div class="pin-digit"><input type="text" id="pin4" maxlength="1" oninput="moveToNext(this,null)" inputmode="numeric"></div>
                    </div>
                    <div class="product-modal-actions">
                        <button class="product-modal-btn product-modal-btn-secondary" onclick="closePinSwipeModal()">Cancel</button>
                        <button class="product-modal-btn product-modal-btn-primary" onclick="savePin()">Continue</button>
                    </div>
                </div>
            `;
            document.getElementById('pinSwipeModal').classList.add('show');
        };

        window.savePin = async function() {
            const pin = getPinFromInputs();
            if (pin.length !== 4) {
                showToast('Enter 4-digit PIN', 'warning');
                return;
            }
            
            try {
                await db.collection('users').doc(currentUser.uid).update({ pin: pin });
                userData.pin = pin;
                showToast('PIN created', 'success');
                closePinSwipeModal();
                showPinEntry();
            } catch (error) {
                showToast('Error saving PIN', 'error');
            }
        };

        window.showPinEntry = function() {
            const attemptsLeft = MAX_PIN_ATTEMPTS - (userData?.pinAttempts || 0);
            
            const modalContent = document.getElementById('pinSwipeContent');
            modalContent.innerHTML = `
                <div class="product-modal-header">
                    <h3>Enter PIN</h3>
                    <button class="product-modal-close" onclick="closePinSwipeModal()">✕</button>
                </div>
                <div class="product-modal-content">
                    <div style="text-align:center; margin:20px 0; font-size:1.2rem;">
                        Total: ₦${currentPurchase.total.toLocaleString()}
                    </div>
                    ${userData?.pinAttempts > 0 ? `
                        <div class="attempts-badge">
                            ${attemptsLeft} attempt${attemptsLeft !== 1 ? 's' : ''} left
                        </div>
                    ` : ''}
                    <div class="pin-container">
                        <div class="pin-digit"><input type="text" id="pin1" maxlength="1" oninput="moveToNext(this,2)" inputmode="numeric"></div>
                        <div class="pin-digit"><input type="text" id="pin2" maxlength="1" oninput="moveToNext(this,3)" inputmode="numeric"></div>
                        <div class="pin-digit"><input type="text" id="pin3" maxlength="1" oninput="moveToNext(this,4)" inputmode="numeric"></div>
                        <div class="pin-digit"><input type="text" id="pin4" maxlength="1" oninput="moveToNext(this,null)" inputmode="numeric"></div>
                    </div>
                    
                    <div class="swipe-container" id="swipeContainer">
                        <div class="swipe-track" id="swipeTrack"></div>
                        <div class="swipe-thumb" id="swipeThumb">
                            <span class="material-icons">chevron_right</span>
                        </div>
                        <div class="swipe-text">Swipe to pay</div>
                    </div>
                    
                    <div class="product-modal-actions">
                        <button class="product-modal-btn product-modal-btn-secondary" onclick="closePinSwipeModal()">Cancel</button>
                    </div>
                </div>
            `;
            
            document.getElementById('pinSwipeModal').classList.add('show');
            
            // Initialize swipe after modal is shown
            setTimeout(initSwipe, 100);
        };

        // ========== SWIPE FUNCTIONALITY ==========
        function initSwipe() {
            swipeThumb = document.getElementById('swipeThumb');
            swipeTrack = document.getElementById('swipeTrack');
            swipeContainer = document.getElementById('swipeContainer');
            
            if (!swipeThumb || !swipeTrack || !swipeContainer) return;
            
            maxSwipe = swipeContainer.offsetWidth - 64;
            swipeCompleted = false;
            
            // Remove old listeners
            swipeThumb.removeEventListener('mousedown', startSwipe);
            swipeThumb.removeEventListener('touchstart', startSwipe);
            document.removeEventListener('mousemove', onSwipeMove);
            document.removeEventListener('touchmove', onSwipeMove);
            document.removeEventListener('mouseup', endSwipe);
            document.removeEventListener('touchend', endSwipe);
            
            // Add new listeners
            swipeThumb.addEventListener('mousedown', startSwipe);
            swipeThumb.addEventListener('touchstart', startSwipe);
        }

        function startSwipe(e) {
            e.preventDefault();
            if (swipeCompleted) return;
            
            isSwiping = true;
            swipeStartX = e.type === 'mousedown' ? e.clientX : e.touches[0].clientX;
            
            document.addEventListener('mousemove', onSwipeMove);
            document.addEventListener('touchmove', onSwipeMove);
            document.addEventListener('mouseup', endSwipe);
            document.addEventListener('touchend', endSwipe);
        }

        function onSwipeMove(e) {
            if (!isSwiping || swipeCompleted) return;
            e.preventDefault();
            
            let clientX = e.type === 'mousemove' ? e.clientX : e.touches[0].clientX;
            const rect = swipeContainer.getBoundingClientRect();
            let newX = clientX - rect.left - 28;
            
            // Constrain to bounds
            newX = Math.max(4, Math.min(newX, maxSwipe));
            
            swipeThumb.style.left = newX + 'px';
            const progress = ((newX - 4) / (maxSwipe - 4)) * 100;
            swipeTrack.style.transform = `translateX(-${100 - progress}%)`;
            
            swipeCurrentX = newX;
        }

        function endSwipe(e) {
            e.preventDefault();
            
            document.removeEventListener('mousemove', onSwipeMove);
            document.removeEventListener('touchmove', onSwipeMove);
            document.removeEventListener('mouseup', endSwipe);
            document.removeEventListener('touchend', endSwipe);
            
            if (!isSwiping || swipeCompleted) return;
            
            isSwiping = false;
            
            // Check if swiped to the end (within 10px)
            if (swipeCurrentX >= maxSwipe - 10) {
                swipeCompleted = true;
                verifyPinAndPay();
            } else {
                // Reset if not swiped enough
                resetSwipe();
            }
        }

        function resetSwipe() {
            if (swipeThumb) swipeThumb.style.left = '4px';
            if (swipeTrack) swipeTrack.style.transform = 'translateX(-100%)';
            swipeCurrentX = 0;
        }

        async function verifyPinAndPay() {
            const pin = getPinFromInputs();
            
            if (pin.length !== 4) {
                showToast('Enter PIN first', 'warning');
                resetSwipe();
                swipeCompleted = false;
                return;
            }
            
            if (userData?.pin === pin) {
                // Correct PIN - reset attempts and complete purchase
                if (userData?.pinAttempts) {
                    await db.collection('users').doc(currentUser.uid).update({
                        pinAttempts: 0
                    });
                    userData.pinAttempts = 0;
                }
                await completePurchase();
            } else {
                // Incorrect PIN - handle attempts
                await handleIncorrectPin();
                resetSwipe();
                swipeCompleted = false;
            }
        }

        async function handleIncorrectPin() {
            if (!currentUser || !db) return;
            
            const currentAttempts = (userData?.pinAttempts || 0) + 1;
            
            if (currentAttempts >= MAX_PIN_ATTEMPTS) {
                // 24-hour ban
                const banExpiry = new Date();
                banExpiry.setHours(banExpiry.getHours() + 24);
                
                await db.collection('users').doc(currentUser.uid).update({
                    pinAttempts: currentAttempts,
                    temporarilyBanned: true,
                    banExpiry: banExpiry
                });
                
                userData.pinAttempts = currentAttempts;
                userData.temporarilyBanned = true;
                userData.banExpiry = banExpiry;
                
                showToast('Too many incorrect attempts. Account locked for 24 hours', 'error');
                closePinSwipeModal();
            } else {
                await db.collection('users').doc(currentUser.uid).update({
                    pinAttempts: currentAttempts
                });
                
                userData.pinAttempts = currentAttempts;
                
                const attemptsLeft = MAX_PIN_ATTEMPTS - currentAttempts;
                showToast(`Incorrect PIN. ${attemptsLeft} attempt${attemptsLeft !== 1 ? 's' : ''} left`, 'error');
            }
        }

        function getPinFromInputs() {
            const pin1 = document.getElementById('pin1')?.value || '';
            const pin2 = document.getElementById('pin2')?.value || '';
            const pin3 = document.getElementById('pin3')?.value || '';
            const pin4 = document.getElementById('pin4')?.value || '';
            return pin1 + pin2 + pin3 + pin4;
        }

        window.moveToNext = function(current, nextId) {
            if (current.value.length === 1 && nextId) {
                document.getElementById(`pin${nextId}`)?.focus();
            }
        };

        // ========== COMPLETE PURCHASE ==========
        async function completePurchase() {
            if (!currentPurchase || !selectedProduct) {
                showToast('Purchase data missing', 'error');
                return;
            }
            
            try {
                const product = selectedProduct;
                const units = currentPurchase.units;
                const total = currentPurchase.total;
                const details = currentPurchase.shippingDetails;
                
                // Start a batch write
                const batch = db.batch();
                
                // Update campaign reserved count
                const campaignRef = db.collection('campaigns').doc(product.id);
                batch.update(campaignRef, {
                    reserved: firebase.firestore.FieldValue.increment(units)
                });
                
                // Update user wallet and stats
                const userRef = db.collection('users').doc(currentUser.uid);
                batch.update(userRef, {
                    walletBalance: firebase.firestore.FieldValue.increment(-total),
                    joinedCampaigns: firebase.firestore.FieldValue.increment(1),
                    reservedUnits: firebase.firestore.FieldValue.increment(units),
                    totalSpent: firebase.firestore.FieldValue.increment(total)
                });
                
                // Create order
                const orderRef = db.collection('orders').doc();
                batch.set(orderRef, {
                    orderId: orderRef.id,
                    userId: currentUser.uid,
                    productId: product.id,
                    productName: product.name,
                    productImage: product.img,
                    units: units,
                    pricePerUnit: product.price,
                    shippingPerUnit: product.shippingCost,
                    subtotal: product.price * units,
                    totalShipping: product.shippingCost * units,
                    total: total,
                    shippingDetails: details,
                    status: 'pending',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                // Create transaction record
                const transactionRef = db.collection('transactions').doc();
                batch.set(transactionRef, {
                    userId: currentUser.uid,
                    type: 'purchase',
                    amount: total,
                    description: `Purchased ${units} × ${product.name}`,
                    status: 'completed',
                    orderId: orderRef.id,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                // Commit the batch
                await batch.commit();
                
                // Update local data
                userData.walletBalance -= total;
                document.getElementById('walletBalance').innerHTML = `₦${(userData.walletBalance || 0).toLocaleString()}`;
                
                // Update product reserved count locally
                product.reserved = (product.reserved || 0) + units;
                
                // Show success
                showSuccess();
                
                // Reload products to reflect updated counts
                await loadProducts();
                
            } catch (error) {
                console.error('Purchase error:', error);
                showToast('Purchase failed: ' + error.message, 'error');
                swipeCompleted = false;
            }
        }

        function showSuccess() {
            const modalContent = document.getElementById('pinSwipeContent');
            modalContent.innerHTML = `
                <div class="product-modal-content">
                    <div class="checkmark-container">
                        <svg class="checkmark-svg" viewBox="0 0 52 52">
                            <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none"/>
                            <path class="checkmark-check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
                        </svg>
                        <div class="checkmark-text">Payment Successful!</div>
                        <div class="checkmark-subtext">₦${currentPurchase.total.toLocaleString()} • Order confirmed</div>
                        <button class="product-modal-btn product-modal-btn-primary" onclick="closePinSwipeModal()" style="margin-top:20px;">Done</button>
                    </div>
                </div>
            `;
            
            playSound();
        }

        function playSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.connect(gain).connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
                
                setTimeout(() => {
                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.frequency.setValueAtTime(1174.66, audioCtx.currentTime);
                    gain2.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    osc2.connect(gain2).connect(audioCtx.destination);
                    osc2.start();
                    osc2.stop(audioCtx.currentTime + 0.3);
                }, 150);
            } catch (e) {}
        }

        window.closePinSwipeModal = function() {
            document.getElementById('pinSwipeModal').classList.remove('show');
            currentPurchase = null;
            swipeCompleted = false;
        };

        // ========== UTILITY FUNCTIONS ==========
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            const msg = document.getElementById('toastMessage');
            
            const icons = { 
                success: 'check_circle', 
                error: 'error', 
                warning: 'warning', 
                info: 'info' 
            };
            icon.textContent = icons[type] || 'info';
            msg.textContent = message;
            
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        window.openFilterModal = function() {
            document.getElementById('filterModal').classList.add('show');
        };

        window.closeFilterModal = function() {
            document.getElementById('filterModal').classList.remove('show');
        };

        // Initialize Swiper
        new Swiper('.banner-swiper', {
            loop: true,
            autoplay: { delay: 3000 },
            pagination: { el: '.swiper-pagination' },
        });

        // Close modals on click outside
        document.getElementById('filterModal').addEventListener('click', function(e) {
            if (e.target === this) closeFilterModal();
        });

        document.getElementById('productModal').addEventListener('click', function(e) {
            if (e.target === this) closeProductModal();
        });

        document.getElementById('pinSwipeModal').addEventListener('click', function(e) {
            if (e.target === this) closePinSwipeModal();
        });
    </script>
</body>
</html>
