<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Test Payment</title>

<script src="https://js.paystack.co/v1/inline.js"></script>
<script src="pay.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#1e293b;
padding:40px;
border-radius:10px;
width:400px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
}

button{
margin-top:20px;
width:100%;
padding:12px;
background:#ff7a00;
border:none;
border-radius:6px;
color:white;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h2>Test Wallet Funding</h2>

<input id="email" placeholder="User Email">

<input id="amount" placeholder="Amount (NGN)" type="number">

<button onclick="pay()">Pay Now</button>

</div>

<script>

function pay(){

const email = document.getElementById("email").value;

const amount = document.getElementById("amount").value;

if(!email || !amount){

alert("Enter email and amount");

return;

}

startPayment(email,amount);

}

</script>

</body>
</html>
