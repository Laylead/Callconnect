<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Paystack Test Payment</title>

<script src="https://js.paystack.co/v1/inline.js"></script>
<script src="pay.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
background:#0f172a;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:420px;
background:#1e293b;
padding:35px;
border-radius:14px;
border:1px solid #334155;
}

h1{
margin-bottom:10px;
font-size:26px;
background:linear-gradient(135deg,#f97316,#d946ef);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
color:#94a3b8;
font-size:14px;
margin-bottom:25px;
}

label{
display:block;
font-size:13px;
margin-bottom:6px;
color:#cbd5e1;
}

input{
width:100%;
padding:12px;
border-radius:6px;
border:1px solid #334155;
background:#0f172a;
color:white;
margin-bottom:15px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:6px;
font-size:16px;
font-weight:600;
cursor:pointer;
background:linear-gradient(135deg,#f97316,#d946ef);
color:white;
}

button:hover{
opacity:.9;
}

.status{
margin-top:20px;
padding:12px;
border-radius:6px;
display:none;
font-size:14px;
}

.success{
display:block;
background:#14532d;
border:1px solid #22c55e;
}

.error{
display:block;
background:#7f1d1d;
border:1px solid #ef4444;
}

.info{
display:block;
background:#1e293b;
border:1px solid #3b82f6;
}

.reference{
margin-top:15px;
font-family:monospace;
font-size:13px;
color:#94a3b8;
word-break:break-all;
}

.testcards{
margin-top:25px;
background:#0f172a;
padding:15px;
border-radius:6px;
border:1px solid #334155;
font-size:13px;
color:#94a3b8;
}

.testcards b{
color:#f97316;
}

</style>
</head>

<body>

<div class="container">

<h1>Paystack Test</h1>
<div class="subtitle">Test payment using pay.js</div>

<label>Email</label>
<input id="email" value="test@email.com">

<label>Amount (₦)</label>
<input id="amount" value="5000" type="number">

<button onclick="pay()">Pay Now</button>

<div id="status" class="status"></div>
<div id="reference" class="reference"></div>

<div class="testcards">

<b>Test Card</b><br><br>

Card: 4084 0840 8408 4081<br>
Expiry: 12/30<br>
CVV: 408<br>
PIN: 0000<br>
OTP: 123456

</div>

</div>


<script>

function showStatus(msg,type){

const el=document.getElementById("status")

el.innerText=msg
el.className="status "+type

}


function pay(){

const email=document.getElementById("email").value
const amount=document.getElementById("amount").value

if(!email || !amount){

showStatus("Enter email and amount","error")
return

}

const ref="TX_"+Date.now()

const handler=PaystackPop.setup({

key:"pk_test_xxxxxxxxxxxxx",

email:email,

amount:amount*100,

currency:"NGN",

ref:ref,

callback:async function(response){

showStatus("Payment successful. Verifying...","info")

document.getElementById("reference").innerHTML="Reference: "+response.reference

try{

const verification=await paystack.verifyTransaction(response.reference)

if(verification.status){

showStatus("Payment Verified Successfully","success")

console.log("Verification",verification)

}else{

showStatus("Verification failed","error")

}

}catch(err){

console.error(err)

showStatus("Verification error: "+err.message,"error")

}

},

onClose:function(){

showStatus("Payment cancelled","error")

}

})

handler.openIframe()

}

</script>

</body>
</html>
